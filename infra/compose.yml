services:
  postgres:
    image: postgres:17-alpine
    container_name: tescord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tescord
      POSTGRES_USER: tescord
      POSTGRES_PASSWORD: tescord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
